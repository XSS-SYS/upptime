name: Static Site CI
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
  pages: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: upptime/uptime-monitor@v1.43.10
        with:
          command: "site"
        env:
          GH_PAT: "${{ secrets.GITHUB_TOKEN }}"
          UPPTIME_COMMITTER: "XSS-SYS <songsongxia@163.com>"
      - name: Bypass auth — use anonymous GitHub API
        run: |
          echo "PWD: $(pwd)"
          echo "Patching JS bundles with Node.js..."
          for f in site/status-page/__sapper__/export/client/createOctokit*.js site/status-page/__sapper__/export/client/legacy/createOctokit*.js; do
            if [ -f "$f" ]; then
              echo "Processing: $f"
              node -e "
const fs = require('fs');
let code = fs.readFileSync('$f', 'utf8');

// Replace De() — strip localStorage token logic, use anonymous auth
code = code.replace(
  /const Ce=l\.userAgent,De=\(\)=>\{[^}]+\}/,
  'const Ce=l.userAgent,De=()=>{return new Se({baseUrl:Ue,userAgent:Ce})}'
);

// Replace Le() — log errors instead of redirecting
code = code.replace(
  /const Le=e=>\{[^}]+\}/,
  'const Le=e=>{console.log(\"API error:\",e.message)}'
);

fs.writeFileSync('$f', code, 'utf8');
"
              if grep -q 'localStorage' "$f"; then
                echo "  ⚠️ localStorage still present"
              else
                echo "  ✅ localStorage reference removed"
              fi
              if grep -q 'Bad credentials' "$f"; then
                echo "  ⚠️ Error redirect still present"
              else
                echo "  ✅ Error redirect replaced with console.log"
              fi
            fi
          done
          echo "Done."
      - name: Upload site artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/status-page/__sapper__/export
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4