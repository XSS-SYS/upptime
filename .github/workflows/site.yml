name: Static Site CI
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
  pages: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: upptime/uptime-monitor@v1.43.10
        with:
          command: "site"
        env:
          GH_PAT: "${{ secrets.GITHUB_TOKEN }}"
          UPPTIME_COMMITTER: "XSS-SYS <songsongxia@163.com>"
      - name: Bypass auth — inject UPPTIME_TOKEN into JS
        env:
          UPPTIME_TOKEN: ${{ secrets.UPPTIME_TOKEN }}
        run: |
          node patch-octokit.js
          echo "Checking results:"
          for f in site/status-page/__sapper__/export/client/createOctokit*.js site/status-page/__sapper__/export/client/legacy/createOctokit*.js; do
            if [ -f "$f" ]; then
              if grep -q 'localStorage' "$f"; then
                echo "  $f: WARNING localStorage still present"
              else
                echo "  $f: OK localStorage removed"
              fi
              if grep -q 'window.location.href' "$f"; then
                echo "  $f: WARNING error redirect still present"
              else
                echo "  $f: OK error redirect removed"
              fi
            fi
          done
          echo "Done."
      - name: Upload site artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/status-page/__sapper__/export
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4