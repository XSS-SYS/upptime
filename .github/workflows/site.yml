name: Static Site CI
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
  pages: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: upptime/uptime-monitor@v1.43.10
        with:
          command: "site"
        env:
          GH_PAT: "${{ secrets.GITHUB_TOKEN }}"
          UPPTIME_COMMITTER: "XSS-SYS <songsongxia@163.com>"
      - name: Inject PAT into JS bundle
        run: |
          TOKEN="${{ secrets.UPPTIME_TOKEN }}"
          echo "PWD: $(pwd)"
          ls -la site/status-page/__sapper__/export/client/ 2>&1 | head -20
          if [ -n "$TOKEN" ]; then
            echo "Injecting PAT into createOctokit JS..."
            sed -i "s|localStorage.getItem(\"personal-access-token\")|\"$TOKEN\"|g" site/status-page/__sapper__/export/client/createOctokit*.js
            echo "Checking result..."
            grep -c "$TOKEN" site/status-page/__sapper__/export/client/createOctokit*.js || echo "Token not found, checking localStorage refs..."
            grep -c "personal-access-token" site/status-page/__sapper__/export/client/createOctokit*.js || echo "No localStorage refs found"
            echo "Done."
          else
            echo "UPPTIME_TOKEN not set, skipping injection."
          fi
      - name: Upload site artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/status-page/__sapper__/export
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4