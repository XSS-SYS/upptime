name: Static Site CI
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: upptime/uptime-monitor@v1.43.6
        with:
          command: "static-site"
        env:
          GH_PAT: "${{ secrets.GITHUB_TOKEN }}"
          UPPTIME_COMMITTER: "XSS-SYS <songsongxia@163.com>"
      - name: Force push to gh-pages
        run: |
          git config user.name "XSS-SYS"
          git config user.email "songsongxia@163.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/XSS-SYS/upptime.git
          git add -A
          git commit --allow-empty -m "chore: update monitoring dashboard" || true
          git push origin HEAD:gh-pages --force