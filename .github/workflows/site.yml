name: Static Site CI
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
  pages: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: upptime/uptime-monitor@v1.43.10
        with:
          command: "site"
        env:
          GH_PAT: "${{ secrets.GITHUB_TOKEN }}"
          UPPTIME_COMMITTER: "XSS-SYS <songsongxia@163.com>"
      - name: Bypass auth — use anonymous GitHub API
        run: |
          cat > /tmp/patch-octokit.js << 'SCRIPT'
const fs = require('fs');
const path = require('path');
function patchDir(dir) {
  const files = fs.readdirSync(dir).filter(f => f.includes('createOctokit'));
  files.forEach(f => {
    const fullPath = path.join(dir, f);
    console.log('Processing:', fullPath);
    let code = fs.readFileSync(fullPath, 'utf8');
    const original = code;
    code = code.replace(
      /const Ce=l\.userAgent,De=\(\)=>\{[^}]+\}/,
      'const Ce=l.userAgent,De=()=>{return new Se({baseUrl:Ue,userAgent:Ce})}'
    );
    code = code.replace(
      /const Le=e=>\{[^}]+\}/,
      'const Le=e=>{console.log("API error:",e.message)}'
    );
    if (code !== original) {
      fs.writeFileSync(fullPath, code, 'utf8');
      console.log('  Patched successfully');
    } else {
      console.log('  No changes needed (pattern not found)');
    }
  });
}
patchDir('site/status-page/__sapper__/export/client');
patchDir('site/status-page/__sapper__/export/client/legacy');
SCRIPT
          node /tmp/patch-octokit.js
          echo "Checking results:"
          for f in site/status-page/__sapper__/export/client/createOctokit*.js site/status-page/__sapper__/export/client/legacy/createOctokit*.js; do
            if [ -f "$f" ]; then
              if grep -q 'localStorage' "$f"; then
                echo "  $f: WARNING localStorage still present"
              else
                echo "  $f: OK localStorage removed"
              fi
              if grep -q 'window.location.href' "$f"; then
                echo "  $f: WARNING error redirect still present"
              else
                echo "  $f: OK error redirect removed"
              fi
            fi
          done
          echo "Done."
      - name: Upload site artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/status-page/__sapper__/export
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4