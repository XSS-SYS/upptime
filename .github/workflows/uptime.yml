 name: Uptime CI
  on:
    schedule:
      - cron: "*/5 * * * *"
    workflow_dispatch: {}
  jobs:
    monitor:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: upptime/uptime-monitor@v1.30.0
          with:
            command: "update"
          env:
            GH_PAT: ${{ secrets.GH_PAT }}
            SECRETS_CONTEXT: ${{ toJson(secrets) }}
