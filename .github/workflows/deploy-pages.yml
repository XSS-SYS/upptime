name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and build Upptime site
        run: |
          npm install -g upptime
          npx upptime --site
        env:
          GH_PAT: "${{ secrets.GITHUB_TOKEN }}"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
